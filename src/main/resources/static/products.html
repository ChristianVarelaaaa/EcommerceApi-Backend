<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <script src="solution.js"></script>
</head>
<body>
    <h2>Products List</h2>
    <form action="/logout" method="post">
        <button type="submit">Logout</button>
    </form>
    <button onclick="createProduct()">Add Product - Admin/Seller Only</button>
    <div id="products"></div>

    <script>
        // Check auth pag load ng page
        checkAuth();

        // Load products gamit apiGet
        apiGet('/api/v1/products').then(data => {
            if (data) {
                document.getElementById('products').innerHTML = JSON.stringify(data, null, 2);
            }
        });

        // Test 403 - dapat Access Denied pag ROLE_USER lang
        function createProduct() {
            apiPost('/api/v1/products', {
                name: "Test Product",
                description: "Test",
                price: 100,
                stock: 10
            }).then(data => {
                if (data) {
                    alert('Product created!');
                    location.reload();
                }
            }).catch(err => {
                console.log(err);
            });
        }
    </script>
</body>
</html>
